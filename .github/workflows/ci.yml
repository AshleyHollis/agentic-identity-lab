name: CI (Validation Only)

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/terraform

      - name: Docker Compose validation
        run: |
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.single-tenant.yml config
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.vendor-shaped.yml config
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.cross-tenant.local.yml config

      - name: Docs presence
        run: |
          test -f docs/deployment/local-docker-compose.md
          test -f docs/deployment/azure-container-apps.md
          test -f docs/deployment/app-service.md
          test -f docs/deployment/aks-optional.md

      # TODO: Add deployment jobs via GitHub OIDC once approved.
