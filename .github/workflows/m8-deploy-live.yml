name: M8 Deploy Live (Protected Manual Scaffold)

on:
  workflow_dispatch:
    inputs:
      environment_slug:
        description: "Placeholder environment selector (example: agentidlab-live)"
        required: true
        default: "agentidlab-live"
      image_tag:
        description: "Container image tag placeholder (example: m8-manual-001)"
        required: true
        default: "m8-manual-001"
      publish_image:
        description: "Enable image publish boundary stage"
        required: false
        default: false
        type: boolean
      run_apply:
        description: "Enable protected IaC apply boundary stage"
        required: false
        default: false
        type: boolean
      run_config_rollout:
        description: "Enable protected config rollout boundary stage"
        required: false
        default: false
        type: boolean
      run_app_rollout:
        description: "Enable protected app rollout boundary stage"
        required: false
        default: false
        type: boolean
      execute_live_mutations:
        description: "Allow mutating az/terraform commands in protected stages"
        required: false
        default: false
        type: boolean
      confirm_live_phrase:
        description: "Required phrase for protected mutation stages"
        required: false
        default: ""
      live_azure_tests:
        description: "Enable smoke stage after deploy boundaries"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: m8-deploy-live-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight contract checks
    runs-on: ubuntu-latest
    outputs:
      deployment_label: ${{ steps.meta.outputs.deployment_label }}
    steps:
      - name: Validate dispatch inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ inputs.environment_slug }}"
          test -n "${{ inputs.image_tag }}"
          if [[ "${{ inputs.run_apply }}" == "true" || "${{ inputs.run_config_rollout }}" == "true" || "${{ inputs.run_app_rollout }}" == "true" ]]; then
            if [[ "${{ inputs.confirm_live_phrase }}" != "APPROVE_M8_LIVE_MUTATION" ]]; then
              echo "Protected mutation stages require confirm_live_phrase=APPROVE_M8_LIVE_MUTATION."
              exit 1
            fi
          fi
      - name: Set deployment metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          label="${{ inputs.environment_slug }}-${{ github.run_number }}"
          echo "deployment_label=${label}" >> "$GITHUB_OUTPUT"
          {
            echo "### M8 deploy-live preflight"
            echo ""
            echo "- deployment_label: ${label}"
            echo "- environment_slug: ${{ inputs.environment_slug }}"
            echo "- image_tag: ${{ inputs.image_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"

  azure-auth-deploy:
    name: Azure auth (deploy identity)
    runs-on: ubuntu-latest
    needs: preflight
    environment: lab-live-azure-deploy
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_DEPLOY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy identity placeholders
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AZURE_CLIENT_ID}"
          test -n "${AZURE_TENANT_ID}"
          test -n "${AZURE_SUBSCRIPTION_ID}"
          python tools/ci/m9_live_preflight.py \
            --context deploy-identity \
            --require AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID

      - name: Azure login (OIDC deploy identity)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: OIDC boundary summary
        shell: bash
        run: |
          {
            echo "### OIDC deploy identity boundary"
            echo ""
            echo "- Deploy identity is protected-environment scoped."
            echo "- APIM preserves inbound Authorization to BFF."
            echo "- Agent Execution Service remains the only OBO boundary."
          } >> "$GITHUB_STEP_SUMMARY"

  build-publish:
    name: Build/publish image boundary
    runs-on: ubuntu-latest
    needs: [preflight, azure-auth-deploy]
    environment: lab-live-azure-deploy
    outputs:
      bff_image: ${{ steps.images.outputs.bff_image }}
      agent_execution_image: ${{ steps.images.outputs.agent_execution_image }}
      mcp_image: ${{ steps.images.outputs.mcp_image }}
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_DEPLOY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC deploy identity)
        if: ${{ inputs.publish_image && inputs.execute_live_mutations }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Dry-run-safe image stage
        id: images
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.publish_image }}" != "true" ]]; then
            {
              echo "publish_image=false; image push not attempted."
              echo "Scaffold command:"
              echo "docker build -t <acr-login-server>/agent-execution:${{ inputs.image_tag }} apps/agent-execution/python-fastapi-agent-framework"
              echo "docker push <acr-login-server>/agent-execution:${{ inputs.image_tag }}"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "bff_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" >> "$GITHUB_OUTPUT"
            echo "agent_execution_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" >> "$GITHUB_OUTPUT"
            echo "mcp_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ inputs.execute_live_mutations }}" != "true" ]]; then
            echo "publish_image=true but execute_live_mutations=false; keeping stage dry-run-safe." >> "$GITHUB_STEP_SUMMARY"
            echo "bff_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" >> "$GITHUB_OUTPUT"
            echo "agent_execution_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" >> "$GITHUB_OUTPUT"
            echo "mcp_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test -n "${AZURE_RESOURCE_GROUP}"
          test -n "${AZURE_LOCATION}"
          suffix="$(printf '%s' "${AZURE_SUBSCRIPTION_ID}${AZURE_RESOURCE_GROUP}" | sha256sum | cut -c1-12)"
          acr_name="ailab${suffix}"
          if ! az acr show --name "${acr_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --output none 2>/dev/null; then
            az acr create \
              --name "${acr_name}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --location "${AZURE_LOCATION}" \
              --sku Basic \
              --admin-enabled false \
              --output none
          fi
          login_server="$(az acr show --name "${acr_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query loginServer -o tsv)"
          tag="${{ inputs.image_tag }}-${{ github.run_number }}"
          az acr build --registry "${acr_name}" --image "bff:${tag}" --file apps/bff/python-fastapi/Dockerfile . --output none
          az acr build --registry "${acr_name}" --image "agent-execution:${tag}" --file apps/agent-execution/python-fastapi-agent-framework/Dockerfile . --output none
          az acr build --registry "${acr_name}" --image "mcp-protected-api:${tag}" --file apps/mcp-protected-api/python-fastapi/Dockerfile . --output none
          echo "bff_image=${login_server}/bff:${tag}" >> "$GITHUB_OUTPUT"
          echo "agent_execution_image=${login_server}/agent-execution:${tag}" >> "$GITHUB_OUTPUT"
          echo "mcp_image=${login_server}/mcp-protected-api:${tag}" >> "$GITHUB_OUTPUT"
          echo "Published service images to protected lab ACR (registry value suppressed)." >> "$GITHUB_STEP_SUMMARY"

  terraform-plan:
    name: Terraform plan boundary
    runs-on: ubuntu-latest
    needs: [preflight, azure-auth-deploy]
    environment: lab-live-azure-deploy
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init/validate/plan (scaffold)
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=infra/terraform/environments/single-tenant-aca init -backend=false
          terraform -chdir=infra/terraform/environments/single-tenant-aca validate
          terraform -chdir=infra/terraform/environments/single-tenant-aca plan \
            -refresh=false \
            -lock=false \
            -input=false \
            -no-color \
            -var-file=terraform.tfvars.example \
            -out=m8-deploy-live.tfplan || true
          if [[ -f "infra/terraform/environments/single-tenant-aca/m8-deploy-live.tfplan" ]]; then
            echo "Terraform plan artifact generated."
          else
            echo "Terraform plan artifact not generated with placeholder values; scaffold boundary still validated."
          fi

      - name: Upload Terraform plan artifact (if present)
        uses: actions/upload-artifact@v4
        with:
          name: m8-deploy-live-tfplan
          path: infra/terraform/environments/single-tenant-aca/m8-deploy-live.tfplan
          retention-days: 3
          if-no-files-found: ignore

  protected-apply:
    name: Protected IaC apply boundary
    runs-on: ubuntu-latest
    needs: [preflight, build-publish, terraform-plan]
    if: ${{ inputs.run_apply }}
    environment: lab-live-azure-deploy
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_DEPLOY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      LIVE_BFF_OBO_CLIENT_SECRET: ${{ secrets.LIVE_BFF_OBO_CLIENT_SECRET }}
      LIVE_AGENT_EXECUTION_OBO_CLIENT_SECRET: ${{ secrets.LIVE_AGENT_EXECUTION_OBO_CLIENT_SECRET }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_DEPLOY }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Azure login (OIDC deploy identity)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Apply stage guardrails
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.execute_live_mutations }}" != "true" ]]; then
            echo "run_apply=true but execute_live_mutations=false; skipping live terraform apply by default." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          test -n "${AZURE_RESOURCE_GROUP}"
          test -n "${AZURE_LOCATION}"

      - name: Bootstrap private Terraform state
        if: ${{ inputs.execute_live_mutations }}
        shell: bash
        run: |
          set -euo pipefail
          suffix="$(printf '%s' "${AZURE_SUBSCRIPTION_ID}${AZURE_RESOURCE_GROUP}" | sha256sum | cut -c1-12)"
          state_account="ailabtf${suffix}"
          if ! az storage account show --name "${state_account}" --resource-group "${AZURE_RESOURCE_GROUP}" --output none 2>/dev/null; then
            az storage account create \
              --name "${state_account}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --location "${AZURE_LOCATION}" \
              --sku Standard_LRS \
              --kind StorageV2 \
              --min-tls-version TLS1_2 \
              --allow-blob-public-access false \
              --output none
          fi
          export ARM_ACCESS_KEY="$(az storage account keys list --account-name "${state_account}" --resource-group "${AZURE_RESOURCE_GROUP}" --query '[0].value' -o tsv)"
          echo "::add-mask::${ARM_ACCESS_KEY}"
          az storage container create --name tfstate --account-name "${state_account}" --account-key "${ARM_ACCESS_KEY}" --output none
          {
            echo "TF_STATE_STORAGE_ACCOUNT=${state_account}"
            echo "ARM_ACCESS_KEY=${ARM_ACCESS_KEY}"
          } >> "$GITHUB_ENV"
          echo "Private Terraform state backend is ready (state account value suppressed)." >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply ACA baseline
        if: ${{ inputs.execute_live_mutations }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          workdir="infra/terraform/environments/single-tenant-aca"
          cleanup_sensitive_files() {
            rm -f "${workdir}/live.auto.tfvars" artifacts/terraform-apply.log artifacts/terraform-apply.err
          }
          trap cleanup_sensitive_files EXIT
          python tools/ci/m9_entra_app_bootstrap.py \
            --environment dev \
            --output-json artifacts/m9-entra-bootstrap.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          data = json.loads(Path("artifacts/m9-entra-bootstrap.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"BFF_AUDIENCE={data['bff_audience']}\n")
              env_file.write(f"AGENT_EXECUTION_AUDIENCE={data['agent_execution_audience']}\n")
              env_file.write(f"MCP_AUDIENCE={data['mcp_audience']}\n")
              env_file.write(f"BLUEPRINT_AUDIENCE={data['blueprint_audience']}\n")
              env_file.write(f"BFF_SCOPE_MCP_ACCESS={data['bff_scope_mcp_access']}\n")
              env_file.write(f"AGENT_SCOPE_MCP_ACCESS={data['agent_execution_scope_mcp_access']}\n")
              env_file.write(f"AGENT_SCOPE_MCP_WRITE={data['agent_execution_scope_mcp_write']}\n")
              env_file.write(f"MCP_SCOPE_MCP_ACCESS={data['mcp_scope_mcp_access']}\n")
              env_file.write(f"MCP_SCOPE_MCP_WRITE={data['mcp_scope_mcp_write']}\n")
              env_file.write(f"BFF_OBO_CLIENT_ID={data['bff_client_id']}\n")
              env_file.write(f"AGENT_OBO_CLIENT_ID={data['agent_execution_client_id']}\n")
          PY
          if [[ -z "${LIVE_BFF_OBO_CLIENT_SECRET}" || -z "${LIVE_AGENT_EXECUTION_OBO_CLIENT_SECRET}" ]]; then
            echo "Missing required protected OBO client secret(s) in lab-live-azure-deploy." >&2
            exit 1
          fi
          token_url="https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token"
          cat > "${workdir}/live.auto.tfvars" <<EOF
          environment = "dev"
          location = "${AZURE_LOCATION}"
          subscription_id = "${AZURE_SUBSCRIPTION_ID}"
          tenant_id = "${AZURE_TENANT_ID}"
          resource_group_name = "${AZURE_RESOURCE_GROUP}"
          bff_image = "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          bff_target_port = 80
          agent_execution_image = "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          agent_execution_target_port = 80
          mcp_image = "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          mcp_target_port = 80
          apim_sku_name = "Consumption_0"
          auth_issuer = "https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0"
          auth_jwks_url = "https://login.microsoftonline.com/${AZURE_TENANT_ID}/discovery/v2.0/keys"
          trusted_tenants = "${AZURE_TENANT_ID}"
          bff_allowed_audiences = "${BFF_AUDIENCE}"
          agent_execution_allowed_audiences = "${AGENT_EXECUTION_AUDIENCE}"
          mcp_allowed_audiences = "${MCP_AUDIENCE}"
          blueprint_audience = "${BLUEPRINT_AUDIENCE}"
          bff_obo_token_url = "${token_url}"
          bff_obo_client_id = "${BFF_OBO_CLIENT_ID}"
          bff_obo_client_secret = "${LIVE_BFF_OBO_CLIENT_SECRET}"
          bff_obo_required_scopes = "${AGENT_SCOPE_MCP_ACCESS} ${AGENT_SCOPE_MCP_WRITE}"
          agent_execution_obo_token_url = "${token_url}"
          agent_execution_obo_client_id = "${AGENT_OBO_CLIENT_ID}"
          agent_execution_obo_client_secret = "${LIVE_AGENT_EXECUTION_OBO_CLIENT_SECRET}"
          agent_execution_obo_required_scopes = "${MCP_SCOPE_MCP_ACCESS} ${MCP_SCOPE_MCP_WRITE}"
          EOF
          terraform -chdir="${workdir}" init \
            -input=false \
            -backend-config="resource_group_name=${AZURE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=single-tenant-aca.tfstate"
          declare -A app_to_address=(
            ["agent-identity-lab-dev-bff"]="module.container_app_bff.azurerm_container_app.this"
            ["agent-identity-lab-dev-agent"]="module.container_app_agent_execution.azurerm_container_app.this"
            ["agent-identity-lab-dev-mcp"]="module.container_app_mcp_protected_api.azurerm_container_app.this"
          )
          for app_name in "${!app_to_address[@]}"; do
            address="${app_to_address[$app_name]}"
            in_state=false
            if terraform -chdir="${workdir}" state show "${address}" >/dev/null 2>&1; then
              in_state=true
            fi
            app_id="$(az containerapp show --name "${app_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query id -o tsv 2>/dev/null || true)"
            if [[ -z "${app_id}" ]]; then
              continue
            fi
            provisioning_state="$(az containerapp show --name "${app_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query properties.provisioningState -o tsv)"
            if [[ "${provisioning_state}" == "Failed" || "${provisioning_state}" == "InProgress" ]]; then
              if [[ "${in_state}" == "true" ]]; then
                terraform -chdir="${workdir}" state rm "${address}" >/dev/null
              fi
              az containerapp delete --name "${app_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --yes --output none
              continue
            fi
            if [[ "${in_state}" == "true" ]]; then
              continue
            fi
            app_id="${app_id/\/providers\/Microsoft.App\/containerapps\//\/providers\/Microsoft.App\/containerApps\/}"
            terraform -chdir="${workdir}" import -input=false "${address}" "${app_id}" >/dev/null
          done
          if ! terraform -chdir="${workdir}" apply -auto-approve -input=false -no-color >artifacts/terraform-apply.log 2>artifacts/terraform-apply.err; then
            echo "Terraform apply failed; detailed output suppressed to avoid exposing live identifiers or protected values." >&2
            exit 1
          fi
          echo "Resolved live audiences and delegated scopes from Entra app registrations (values suppressed)." >> "$GITHUB_STEP_SUMMARY"
          echo "Terraform apply completed for the ACA baseline." >> "$GITHUB_STEP_SUMMARY"

  config-rollout:
    name: Config rollout boundary
    runs-on: ubuntu-latest
    needs: [preflight, azure-auth-deploy, terraform-plan]
    if: ${{ inputs.run_config_rollout }}
    environment: lab-live-azure-deploy
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Config stage guardrails
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.execute_live_mutations }}" != "true" ]]; then
            echo "run_config_rollout=true but execute_live_mutations=false; keeping config stage dry-run-safe." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "Scaffold config rollout command:"
            echo "az containerapp update --name <bff-app> --resource-group <rg-placeholder> --set-env-vars AUTH_MODE=strict OTEL_EXPORTER_OTLP_ENDPOINT=<endpoint-placeholder>"
          } >> "$GITHUB_STEP_SUMMARY"

  app-rollout:
    name: Container/app rollout boundary
    runs-on: ubuntu-latest
    needs: [preflight, azure-auth-deploy, build-publish, protected-apply]
    if: ${{ inputs.run_app_rollout }}
    environment: lab-live-azure-deploy
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_DEPLOY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
    steps:
      - name: Azure login (OIDC deploy identity)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: App rollout guardrails
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.execute_live_mutations }}" != "true" ]]; then
            echo "run_app_rollout=true but execute_live_mutations=false; app rollout stays dry-run-safe." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          test -n "${AZURE_RESOURCE_GROUP}"

      - name: Roll out protected service images
        if: ${{ inputs.execute_live_mutations }}
        shell: bash
        run: |
          set -euo pipefail
          suffix="$(printf '%s' "${AZURE_SUBSCRIPTION_ID}${AZURE_RESOURCE_GROUP}" | sha256sum | cut -c1-12)"
          acr_name="ailab${suffix}"
          acr_id="$(az acr show --name "${acr_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query id -o tsv)"
          login_server="$(az acr show --name "${acr_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query loginServer -o tsv)"

          declare -A app_to_image=(
            ["agent-identity-lab-dev-bff"]="${{ needs.build-publish.outputs.bff_image }}"
            ["agent-identity-lab-dev-agent"]="${{ needs.build-publish.outputs.agent_execution_image }}"
            ["agent-identity-lab-dev-mcp"]="${{ needs.build-publish.outputs.mcp_image }}"
          )
          declare -A app_to_identity=(
            ["agent-identity-lab-dev-bff"]="agent-identity-lab-dev-id-bff"
            ["agent-identity-lab-dev-agent"]="agent-identity-lab-dev-id-agent-execution"
            ["agent-identity-lab-dev-mcp"]="agent-identity-lab-dev-id-mcp"
          )

          for app_name in "${!app_to_image[@]}"; do
            identity_name="${app_to_identity[$app_name]}"
            identity_id="$(az identity show --name "${identity_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query id -o tsv)"
            principal_id="$(az identity show --name "${identity_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query principalId -o tsv)"
            az role assignment create \
              --assignee-object-id "${principal_id}" \
              --assignee-principal-type ServicePrincipal \
              --role AcrPull \
              --scope "${acr_id}" \
              --output none 2>/dev/null || true
            acrpull_ready=false
            for role_attempt in {1..12}; do
              assignment_count="$(az role assignment list --assignee "${principal_id}" --scope "${acr_id}" --query "[?roleDefinitionName=='AcrPull'] | length(@)" -o tsv)"
              if [[ "${assignment_count}" != "0" ]]; then
                acrpull_ready=true
                break
              fi
              sleep 10
            done
            if [[ "${acrpull_ready}" != "true" ]]; then
              echo "Managed identity ${identity_name} does not have AcrPull on the protected ACR." >&2
              exit 1
            fi
            app_id="$(az containerapp show --name "${app_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query id -o tsv)"
            mkdir -p artifacts
            patch_file="artifacts/${app_name}-patch.json"
            python - "$app_name" "${AZURE_RESOURCE_GROUP}" "${app_to_image[$app_name]}" "${login_server}" "${identity_id}" "$patch_file" <<'PY'
          import json
          import subprocess
          import sys

          app_name, resource_group, image, login_server, identity_id, patch_file = sys.argv[1:7]
          app = json.loads(
              subprocess.check_output(
                  [
                      "az",
                      "containerapp",
                      "show",
                      "--name",
                      app_name,
                      "--resource-group",
                      resource_group,
                      "--output",
                      "json",
                  ],
                  text=True,
              )
          )
          configuration = app["properties"]["configuration"]
          template = app["properties"]["template"]
          ingress = {
              "external": configuration["ingress"].get("external", False),
              "targetPort": 8000,
              "transport": configuration["ingress"].get("transport", "Auto"),
              "traffic": configuration["ingress"].get("traffic") or [{"latestRevision": True, "weight": 100}],
          }
          if "allowInsecure" in configuration["ingress"]:
              ingress["allowInsecure"] = configuration["ingress"]["allowInsecure"]
          containers = template["containers"]
          containers[0]["image"] = image
          patch = {
              "properties": {
                  "configuration": {
                      "activeRevisionsMode": configuration.get("activeRevisionsMode", "Single"),
                      "ingress": ingress,
                      "registries": [{"server": login_server, "identity": identity_id}],
                  },
                  "template": {"containers": containers},
              }
          }
          with open(patch_file, "w", encoding="utf-8") as handle:
              json.dump(patch, handle)
          PY
            az rest \
              --method PATCH \
              --url "https://management.azure.com${app_id}?api-version=2024-03-01" \
              --body "@${patch_file}" \
              --output none
            rm -f "${patch_file}"
            for attempt in {1..40}; do
              provisioning_state="$(az containerapp show --name "${app_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query properties.provisioningState -o tsv)"
              if [[ "${provisioning_state}" == "Succeeded" ]]; then
                break
              fi
              if [[ "${provisioning_state}" == "Failed" ]]; then
                echo "Container App ${app_name} failed during image rollout." >&2
                exit 1
              fi
              sleep 15
            done
            if [[ "${provisioning_state}" != "Succeeded" ]]; then
              echo "Container App ${app_name} did not finish image rollout in time." >&2
              exit 1
            fi
          done
          echo "Rolled out protected service images to ACA using managed identity AcrPull." >> "$GITHUB_STEP_SUMMARY"

  deploy-summary:
    name: Deploy summary
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build-publish
      - terraform-plan
    if: ${{ always() }}
    outputs:
      deployment_label: ${{ needs.preflight.outputs.deployment_label }}
      smoke_ready: ${{ inputs.live_azure_tests }}
    steps:
      - name: Publish deploy metadata
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### M8 deploy-live summary"
            echo ""
            echo "- deployment_label: ${{ needs.preflight.outputs.deployment_label }}"
            echo "- resource_group_placeholder: <rg-name-placeholder>"
            echo "- deploy_status: scaffold-complete"
            echo "- smoke_ready_input: ${{ inputs.live_azure_tests }}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-stage:
    name: Smoke gate (protected/manual only)
    needs: deploy-summary
    if: ${{ inputs.live_azure_tests }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/m8-smoke-trace.yml
    with:
      environment_slug: ${{ inputs.environment_slug }}
      deployment_label: ${{ needs.deploy-summary.outputs.deployment_label }}
      live_azure_tests: ${{ inputs.live_azure_tests }}
      run_live_azure_checks: false
      kql_lookback: "30m"
    secrets: inherit
