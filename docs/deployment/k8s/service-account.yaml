# ILLUSTRATIVE REFERENCE ONLY — not applied by CI or production automation.
# All GUIDs and IDs are placeholder values. Do not replace with real tenant or client IDs.
#
# Purpose: Kubernetes ServiceAccount for the Agentic Layer workload.
# The Azure Workload Identity webhook uses these annotations to inject a federated
# token into the pod, which the Entra Agent ID sidecar uses to acquire Agent OBO tokens.
#
# Annotations:
#   azure.workload.identity/client-id  — the blueprint app's client ID (placeholder).
#   azure.workload.identity/tenant-id  — the trusted Entra tenant ID (placeholder).
#
# The ServiceAccount name must match the Kubernetes subject configured in the
# federated identity credential (infra/terraform/modules/workload-identity/).
#
# Spec: 002-aks-entra-agent-id / FR-08 / T05
# Terminology: "Agentic Layer" = apps/agent-gateway/ (legacy filesystem path preserved)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentic-layer
  namespace: agent-workloads
  annotations:
    # Placeholder blueprint client ID — replace with value from
    # infra/terraform/environments/aks/terraform.tfvars.example before any live use.
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000201"
    # Placeholder tenant ID — replace with your Entra tenant ID before any live use.
    azure.workload.identity/tenant-id: "00000000-0000-0000-0000-000000000001"
  labels:
    app.kubernetes.io/name: agentic-layer
    app.kubernetes.io/part-of: agentic-identity-lab
    app.kubernetes.io/managed-by: illustrative-reference
